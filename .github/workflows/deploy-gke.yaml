name: Build and Deploy LangGraph App to GKE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: your-gcp-project-id
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: your-artifact-registry-repo
  GKE_CLUSTER: your-gke-cluster-name
  GKE_ZONE: us-central1-c
  BACKEND_IMAGE_NAME: agentic-chatbot-backend
  FRONTEND_IMAGE_NAME: agentic-chatbot-frontend

jobs:
  setup-build-publish-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: production
    
    # Required permissions for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Authenticate to GCP securely without JSON keys
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        token_format: 'access_token'
        workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
        service_account: 'my-service-account@my-project.iam.gserviceaccount.com'

    # 2. Configure Docker to use Artifact Registry
    - name: Docker Auth
      run: |
        echo ${{ steps.auth.outputs.access_token }} | docker login -u oauth2accesstoken --password-stdin https://${{ env.GAR_LOCATION }}-docker.pkg.dev

    # 3. Build the Backend Docker image
    - name: Build Backend Container
      run: |-
        docker build \
          --tag "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}" \
          gemini-multitenant-chatbot/backend

    # 4. Push the Backend image to Google Artifact Registry
    - name: Push Backend Container
      run: |-
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"

    # 5. Build the Frontend Docker image
    - name: Build Frontend Container
      run: |-
        docker build \
          --tag "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}" \
          gemini-multitenant-chatbot/frontend

    # 6. Push the Frontend image to Google Artifact Registry
    - name: Push Frontend Container
      run: |-
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}"

    # 7. Fetch GKE Cluster Credentials
    - name: Set up GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    # 8. Deploy to the Kubernetes Cluster
    - name: Deploy to GKE
      run: |-
        # Replace the placeholder in the manifest with the newly built image tag
        sed -i "s|BACKEND_IMAGE_PLACEHOLDER|${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}|g" k8s/backend-deployment.yaml
        sed -i "s|FRONTEND_IMAGE_PLACEHOLDER|${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}|g" k8s/frontend-deployment.yaml
        
        kubectl apply -f k8s/backend-deployment.yaml
        kubectl apply -f k8s/frontend-deployment.yaml
        kubectl rollout status deployment/backend-deployment
        kubectl rollout status deployment/frontend-deployment